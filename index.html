<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原點匹克球 | 官方目錄</title>
    
    <link rel="icon" href="https://hua-origin-pickleball.github.io/shop/logo.jpg" type="image/jpeg">
    
    <style>
        :root { --primary: #2c3e50; --accent: #4a6741; --bg: #f4f7f6; }
        body { font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* 頁首 */
        .header { background: white; padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .logo { max-width: 150px; margin-bottom: 10px; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        /* 商品卡片排列 */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.3s; }
        
        /* 圖片容錯處理：若無網址則顯示佔位符 */
        .product-img { 
            width: 100%; 
            height: 250px; 
            object-fit: contain; 
            background: #eee; 
            padding: 15px; 
            box-sizing: border-box;
            display: block;
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.jpg" alt="原點匹克球 Logo" class="logo" onerror="this.src='https://via.placeholder.com/150?text=Origin+Pickleball'">
        <h1>原點匹克球</h1>
    </header>

    <div class="container">
        <div class="product-grid" id="product-container">
            </div>
    </div>

    <script>
        // 這是從您的「原點匹克球商品一覽」試算表抓取的資料範例 
        const products = [
            { brand: "JNICE", name: "量子 QUANTUM 雙拍套組", price: 1320, category: "球拍", img: "" },
            { brand: "ANIVIIA", name: "V1-Voltic 1.0", price: 2060, category: "球拍", img: "" },
            { brand: "Vispinvo", name: "Apex 全能競技", price: 5100, category: "球拍", img: "" }
        ];

        const container = document.getElementById('product-container');
        
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-item';
            // 處理圖片：若試算表 img 欄位為空，則顯示預設圖
            const imgSrc = p.img || 'https://via.placeholder.com/250?text=No+Image';
            
            card.innerHTML = `
                <img src="${imgSrc}" class="product-img" alt="${p.name}">
                <div style="padding: 15px;">
                    <small>${p.brand}</small>
                    <h3>${p.name}</h3>
                    <p style="color: #d35400; font-weight: bold;">NT$ ${p.price}</p>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
