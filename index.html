<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原點匹克球 | Origin Pickleball</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4a6741; /* 專業森林綠 */
            --accent: #e67e22;  /* 活力橘 */
            --bg-light: #f8faf9;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg-light); color: var(--text-main); line-height: 1.7; }

        /* Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 45px; height: 45px; border: 5px solid #eee; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Navigation */
        nav { background: var(--white); height: 70px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .nav-container { max-width: 1200px; margin: 0 auto; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo { display: flex; align-items: center; cursor: pointer; text-decoration: none; color: var(--text-main); font-weight: 800; font-size: 1.2rem; }
        .nav-logo img { height: 45px; margin-right: 12px; border-radius: 4px; }
        
        .menu { display: flex; gap: 10px; }
        .menu a { text-decoration: none; color: var(--text-main); font-weight: 600; padding: 8px 16px; border-radius: 6px; transition: 0.3s; cursor: pointer; }
        .menu a:hover { background: #f0f4f0; color: var(--primary); }
        .menu a.active { background: var(--primary); color: white; }

        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }

        /* Side Menu (Mobile) */
        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: white; z-index: 2001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 80px 30px; display: flex; flex-direction: column; gap: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        .side-menu.active { right: 0; }
        .side-menu a { text-decoration: none; color: var(--text-main); font-size: 1.2rem; font-weight: bold; padding: 10px 0; border-bottom: 1px solid #eee; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .overlay.active { display: block; }

        /* Hero Slider */
        .hero { width: 100%; height: 500px; position: relative; overflow: hidden; background: #222; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 1s; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.35); }
        .hero-text { position: relative; color: white; text-align: center; z-index: 5; }
        .hero-text h1 { font-size: 3rem; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Academy Style Cards */
        .story-section { display: grid; grid-template-columns: 1fr; gap: 40px; margin-bottom: 60px; }
        .info-card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        /* 藍色標題樣式 */
        .info-card h2 { color: #0056b3 !important; font-size: 1.5rem !important; }
        .info-card h2::after { background: #0056b3 !important; width: 100% !important; }
        .content-text { white-space: pre-line; color: #444; font-size: 1.1rem; margin-top: 25px; }

        /* Boutique Product Grid */
        .shop-layout { display: grid; grid-template-columns: 260px 1fr; gap: 40px; }
        .filter-bar { background: var(--white); padding: 25px; border-radius: 15px; height: fit-content; position: sticky; top: 100px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: var(--primary); }
        .filter-group select, .search-box { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; outline: none; background: #fafafa; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .product-card { background: var(--white); border-radius: 15px; overflow: hidden; border: 1px solid #eee; cursor: pointer; transition: 0.3s; position: relative; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .img-wrap { height: 180px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 15px; }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 15px; }
        .card-brand { color: var(--primary); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-name { font-weight: bold; font-size: 1rem; margin: 5px 0; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-price { color: var(--accent); font-weight: 800; font-size: 1.2rem; }

        /* Contact Section (電腦版左右卡片) */
        .contact-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; align-items: stretch; }
        .contact-card { display: flex; flex-direction: column; gap: 15px; }
        .contact-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 20px; border-radius: 15px; text-decoration: none; color: white; font-weight: bold; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .btn-line { background: #06c755; }
        .btn-fb { background: #1877f2; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .contact-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .map-wrapper { border-radius: 20px; overflow: hidden; border: 1px solid #eee; height: 450px; }
        .map-wrapper iframe { width: 100%; height: 100%; border: 0; }

        /* Modal 精品展示 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 950px; border-radius: 25px; display: flex; overflow: hidden; position: relative; max-height: 90vh; }
        .modal-img { flex: 1; padding: 40px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .modal-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-details { flex: 1; padding: 50px; background: #fafafa; overflow-y: auto; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #ccc; }

        footer { background: #1a1a1a; color: #999; padding: 50px 20px; text-align: center; }
        footer strong { color: white; display: block; font-size: 1.2rem; margin-bottom: 10px; }

        /* RWD */
        @media (max-width: 900px) {
            .menu { display: none; }
            .menu-toggle { display: block; }
            .shop-layout { grid-template-columns: 1fr; }
            .filter-bar { position: relative; top: 0; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 10px; }
            .filter-group { flex: 1; min-width: 140px; margin-bottom: 0; }
            .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .contact-layout { grid-template-columns: 1fr; }
            .modal-box { flex-direction: column; }
            .hero { height: 350px; }
            .hero-text h1 { font-size: 1.8rem; }
        }
    </style>
</head>

<script>
const SID = '11Uc9hJpgaeci-zsmDi1FQZBgl7f1r_vpVaNeb1Y_Dos';
let products = [];
let slideIdx = 0;

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    document.querySelector('.overlay').classList.toggle('active');
}

function navTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    const btn = document.getElementById('nav-' + page);
    if(btn) btn.classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
    if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu();
}

function parseCSV(csv) {
    const rows = []; let row = [], col = '', inQ = false;
    for (let i = 0; i < csv.length; i++) {
        let c = csv[i], next = csv[i+1];
        if (c === '"' && inQ && next === '"') { col += '"'; i++; }
        else if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { row.push(col.trim()); col = ''; }
        else if ((c === '\n' || c === '\r') && !inQ) {
            if (col || row.length) { row.push(col.trim()); rows.push(row); }
            row = []; col = ''; if(c==='\r' && next==='\n') i++;
        } else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    return rows;
}

const fixUrl = (url) => {
    if (!url || !url.startsWith('http')) return 'logo.jpg';
    const m = url.match(/(?:\/d\/|id=)([\w-]+)/);
    return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : url;
};

// Data Initializing
async function init() {
    try {
        // Settings
        const sRes = await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Settings`);
        const sData = parseCSV(await sRes.text());
        const S = {}; const base = [], cour = [], hero = [];
        sData.forEach(r => {
            const k = r[0], v = r[1]; if(!k) return; S[k] = v;
            if(k.startsWith('HeroURL')) hero.push(fixUrl(v));
            if(k.startsWith('BaseImg')) { let i=k.slice(7); if(!base[i])base[i]={}; base[i].img=fixUrl(v); }
            if(k.startsWith('BaseText')) { let i=k.slice(8); if(!base[i])base[i]={}; base[i].txt=v; }
            if(k.startsWith('CourseImg')) { let i=k.slice(9); if(!cour[i])cour[i]={}; cour[i].img=fixUrl(v); }
            if(k.startsWith('CourseText')) { let i=k.slice(10); if(!cour[i])cour[i]={}; cour[i].txt=v; }
        });

        // Apply Settings
        if(S.LogoURL) document.getElementById('logo-img').src = fixUrl(S.LogoURL);
        document.getElementById('text-about').innerText = S.AboutContent || '';
        document.getElementById('text-philosophy').innerText = S.Philosophy || '';
        document.getElementById('text-course').innerText = S.CourseContent || '';
        document.getElementById('text-contact-desc').innerText = S.ContactDesc || '';
        document.getElementById('link-line').href = S.ContactLink || '#';
        document.getElementById('link-fb').href = S.FBLink || '#';
        document.getElementById('link-ig').href = S.IGLink || '#';
        document.getElementById('f-slogan').innerText = S.FooterSlogan || '';
        document.getElementById('f-biz').innerText = S.BizInfo ? `統一編號：${S.BizInfo}` : '';
        document.getElementById('f-staff').innerText = S.StaffContact || '';
        document.getElementById('f-addr').innerText = S.Address || '';
        // 教學服務分頁資料填入
        document.getElementById('text-course-intro').innerText = S.CourseIntro || ''; // 課程介紹文字
        document.getElementById('img-course-poster').src = fixUrl(S.CoursePoster);    // 課程海報圖片
        document.getElementById('text-course-fees').innerText = S.CourseFees || '';   // 課程費用文字
        document.getElementById('text-coach-intro').innerText = S.CoachIntro || '';   // 教練介紹文字
        document.getElementById('img-coach-portrait').src = fixUrl(S.CoachImg);       // 教練照片圖片
        document.getElementById('text-equipment').innerText = S.CourseNotes || ''; // 球拍租借說明
        document.getElementById('text-faq').innerText = S.CourseFAQ || '';         // 學員常見問題 (FAQ)
        // --- 替換開始：Hero 輪播圖增強版邏輯 ---
        const hBox = document.getElementById('hero-slider');
        const dBox = document.getElementById('hero-dots'); // 這是對應 HTML 裡的圓點容器

        hero.forEach((u, i) => {
            // 產生照片投影片
            const div = document.createElement('div');
            div.className = `slide ${i===0?'active':''}`;
            div.style.backgroundImage = `url('${u}')`;
            div.innerHTML = `<div class="hero-overlay"></div><div class="hero-text"><h1>${S.HeroTitle || '原點匹克球'}</h1></div>`;
            hBox.appendChild(div);

            // 產生下方圓點
            const dot = document.createElement('div');
            dot.className = `dot ${i===0?'active':''}`;
            dot.onclick = () => { slideIdx = i; updateSliderUI(); };
            if(dBox) dBox.appendChild(dot);
        });

        // 定義更新畫面函式
        window.updateSliderUI = function() {
            const ss = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            if(!ss.length) return;
            ss.forEach((s, i) => s.classList.toggle('active', i === slideIdx));
            dots.forEach((d, i) => d.classList.toggle('active', i === slideIdx));
        };

        // 定義切換函式（給左右箭頭用）
        window.changeSlide = function(n) {
            const ss = document.querySelectorAll('.slide');
            if(!ss.length) return;
            slideIdx = (slideIdx + n + ss.length) % ss.length;
            updateSliderUI();
        };

        // 自動輪播
        setInterval(() => {
            changeSlide(1);
        }, 5000);
        // --- 替換結束 ---

        // Modules
        const drawMod = (arr, tid) => arr.forEach(m => {
            if(!m) return;
            document.getElementById(tid).innerHTML += `
            <div style="margin-top:40px;">
                <img src="${m.img}" style="width:100%; border-radius:15px; height:350px; object-fit:cover; box-shadow:0 10px 20px rgba(0,0,0,0.05);">
                <div class="content-text" style="margin-top:20px;">${m.txt}</div>
            </div>`;
        });
        drawMod(base, 'extra-about');
        drawMod(cour, 'course-content-area');
// --- 場地資訊自動產生邏輯 ---
        const venueContainer = document.getElementById('venue-list-container');
        if (venueContainer) {
            venueContainer.innerHTML = ''; // 清空
            for (let i = 1; i <= 10; i++) {
                const vName = S[`VenueName${i}`];
                const vAddr = S[`VenueAddr${i}`];
                const vDesc = S[`VenueDesc${i}`];
                const vImg = S[`VenueImg${i}`];

                if (!vName) continue; // 沒填名稱就跳過

                venueContainer.innerHTML += `
                    <div class="info-card" style="margin-bottom: 30px;">
                        <div class="flex-row">
                            <div class="side-img">
                                <img src="${fixUrl(vImg)}" alt="${vName}">
                            </div>
                            <div class="side-text">
                                <h2 style="color: #0056b3 !important;">${vName}</h2>
                                <p><strong>地點：</strong>${vAddr || '請洽教練'}</p>
                                <div class="content-text" style="margin-top:10px;">${vDesc || ''}</div>
                            </div>
                        </div>
                    </div>`;
            }
        }
        const partnerContainer = document.getElementById('partner-list-container');
        if (partnerContainer) {
            partnerContainer.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const pName = S[`PartnerName${i}`];
                const pDesc = S[`PartnerDesc${i}`];
                const pImg = S[`PartnerImg${i}`];
                const pLink = S[`PartnerLink${i}`];

                if (!pName) continue;

                partnerContainer.innerHTML += `
                    <div class="info-card" style="margin-bottom: 30px;">
                        <div class="flex-row">
                            <div class="side-img">
                                <img src="${fixUrl(pImg)}" alt="${pName}">
                            </div>
                            <div class="side-text">
                                <h2 style="color: #0056b3 !important;">${pName}</h2>
                                <div class="content-text">${pDesc || ''}</div>
                                ${pLink ? `<a href="${pLink}" target="_blank" style="display:inline-block; margin-top:15px; color:var(--primary); font-weight:bold;">了解更多 <i class="fas fa-external-link-alt"></i></a>` : ''}
                            </div>
                        </div>
                    </div>`;
            }
        }
        // Map
        if(S.ContactMap) {
            document.getElementById('map-box').innerHTML = S.ContactMap.includes('<iframe') ? S.ContactMap : `<iframe src="${S.ContactMap}"></iframe>`;
        }

        // Products
        const pRes = await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Products`);
        const pData = parseCSV(await pRes.text()).slice(1);
        products = pData.map((r, i) => ({
            id: i, brand: r[0], name: r[1], cat: r[2], price: r[3], desc: r[4], img: fixUrl(r[5]), spec: r[6], stock: r[7], coach: r[8]
        })).filter(p => p.name);

        const brands = [...new Set(products.map(p => p.brand))].filter(Boolean);
        brands.forEach(b => document.getElementById('sel-brand').innerHTML += `<option value="${b}">${b}</option>`);
        updateCatOptions();

    } catch (e) {
        console.error("資料載入失敗", e);
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

function updateCatOptions() {
    const b = document.getElementById('sel-brand').value;
    const s = document.getElementById('sel-cat');
    s.innerHTML = '<option value="all">所有類別</option>';
    const cats = b === 'all' ? products.map(p => p.cat) : products.filter(p => p.brand === b).map(p => p.cat);
    [...new Set(cats)].filter(Boolean).forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
    drawProducts();
}

function drawProducts() {
    const b = document.getElementById('sel-brand').value;
    const c = document.getElementById('sel-cat').value;
    const q = document.getElementById('search-box').value.toLowerCase();
    const g = document.getElementById('product-list');
    g.innerHTML = '';
    products.filter(p => (b==='all'||p.brand===b) && (c==='all'||p.cat===c) && p.name.toLowerCase().includes(q))
    .forEach(p => {
        g.innerHTML += `
        <div class="product-card" onclick="openModal(${p.id})">
            <div class="img-wrap"><img src="${p.img}"></div>
            <div class="card-info">
                <div class="card-brand">${p.brand} | ${p.cat}</div>
                <div class="card-name">${p.name}</div>
                <div class="card-price">$${p.price || '洽詢'}</div>
            </div>
        </div>`;
    });
}

function openModal(id) {
    const p = products.find(x => x.id === id);
    document.getElementById('m-img').src = p.img;
    document.getElementById('m-name').innerText = p.name;
    document.getElementById('m-price').innerText = `$${p.price || '洽詢'}`;
    document.getElementById('m-spec').innerText = p.spec || '請洽詢教練';
    document.getElementById('m-stock').innerText = p.stock || '現貨供應中';
    document.getElementById('m-coach').innerText = p.coach || '這款球拍的手感非常紮實，特別適合追求控球與穩定度的球友！';
    document.getElementById('m-btn-buy').href = document.getElementById('link-line').href;
    document.getElementById('p-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('p-modal').style.display = 'none'; }

init();
</script>
</body>
</html>
